        приложения. Например, онбординг может включать в себя заполнение профиля,
        добавление друзей, участие в мероприятиях и т.д.
      parameters:
      - description: Уникальный идентификатор запроса для трассировки
        in: header
        name: X-Request-Id
        required: true
        type: string
      - description: Платформа, для которой запрашиваются онбординги.
        in: query
        name: platform
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.OnboardingDto'
            type: array
        "401":
          description: Не авторизован
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - VkAuth: []
      summary: Получить список онбордингов для пользователя
      tags:
      - onboarding
  /v1/onboardings/{id}:
    post:
      consumes:
      - application/json
      description: Пометить онбординг как пройденный для пользователя. Это означает,
        что пользователь прошел определенный этап онбординга и может перейти к следующему
        этапу или использовать функционал, который был заблокирован до прохождения
        этого этапа.
      parameters:
      - description: Уникальный идентификатор запроса для трассировки
        in: header
        name: X-Request-Id
        required: true
        type: string
      - description: Уникальный идентификатор онбординга
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
        "401":
          description: Не авторизован
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - VkAuth: []
      summary: Пометить онбординг как пройденный для пользователя
      tags:
      - onboarding
  /v1/onboardings/all:
    get:
      consumes:
      - application/json
      description: Возвращает все онбординги для указанной платформы без учёта прогресса
        пользователя.
      parameters:
      - description: Уникальный идентификатор запроса для трассировки
        in: header
        name: X-Request-Id
        required: true
        type: string
      - description: Платформа, для которой запрашиваются онбординги.
        in: query
        name: platform
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.OnboardingDto'
            type: array
        "401":
          description: Не авторизован
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - VkAuth: []
      summary: Получить все онбординги платформы
      tags:
      - onboarding
  /v1/queue/{postId}:
    delete:
      consumes:
      - application/json
      parameters:
      - description: X-Request-Id
        in: header
        name: X-Request-Id
        required: true
        type: string
      - description: ID поста VK
        in: path
        name: postId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
        "400":
          description: Некорректный ID поста
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - VkAuth: []
      summary: Удаление поста из очереди событий по ID поста
      tags:
      - EventQueue
  /v1/team-events:
    post:
      consumes:
      - application/json
      description: Создает командное мероприятие с указанием организаторов и вложений.
      parameters:
      - description: Уникальный идентификатор запроса
        in: header
        name: X-Request-Id
        required: true
        type: string
      - description: Данные командного мероприятия с организаторами и вложениями
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/team_dto.CreateTeamEventDto'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/team_dto.TeamEventDto'
        "400":
          description: Некорректные данные
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Не авторизован
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - VkAuth: []
      summary: Создать командное мероприятие (расширенный)
      tags:
      - teams
  /v1/team-events/{id}:
    get:
      consumes:
      - application/json
      description: Возвращает командное мероприятие с ограничениями команды и организаторами.
      parameters:
      - description: Уникальный идентификатор запроса
        in: header
