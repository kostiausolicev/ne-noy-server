      summary: Создание события из поста в очереди
      tags:
      - EventQueue
  /v1/health-import/apple/parse:
    post:
      consumes:
      - multipart/form-data
      description: Принимает zip-архив c экспортом данных здоровья и возвращает распарсенные
        метаданные тренировок.
      parameters:
      - description: Уникальный идентификатор запроса
        in: header
        name: X-Request-Id
        required: true
        type: string
      - description: Платформа источника данных
        in: formData
        name: platform
        required: true
        type: string
      - description: Zip-архив с метаданными
        in: formData
        name: archive
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.UserActivitiesInfo'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - VkAuth: []
      summary: Распарсить метаданные тренировок из zip-файла
      tags:
      - health-import
  /v1/onboardings:
    get:
      consumes:
      - application/json
      description: Получить список онбордингов для пользователя. Онбординги - это
        этапы, которые пользователь должен пройти для полного использования функционала
        приложения. Например, онбординг может включать в себя заполнение профиля,
        добавление друзей, участие в мероприятиях и т.д.
      parameters:
      - description: Уникальный идентификатор запроса для трассировки
        in: header
        name: X-Request-Id
        required: true
        type: string
