  /v1/users/vk/{id}:
    get:
      consumes:
      - application/json
      description: Находит пользователя по его VK ID
      parameters:
      - description: Уникальный идентификатор запроса
        in: header
        name: X-Request-Id
        required: true
        type: string
      - description: 'VK ID пользователя (числовой идентификатор, например: 12345678)'
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.UserDto'
        "400":
          description: Некорректный формат VK ID
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Пользователь не найден
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - VkAuth: []
