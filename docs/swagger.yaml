        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - VkAuth: []
      summary: Подтвердить/проверить участие (отметка)
      tags:
      - events
  /v1/events/event/{id}/unparticipate:
