host: https://simply-funny-spearfish.cloudpub.ru
info:
  contact: {}
  description: API к ИС Не-Ной
  title: Ne-Noy-Api
  version: "1.0"
paths:
  /v1/attachments:
    delete:
      consumes:
      - application/json
      description: Удаляет список файлов по UUID. При force=false физически удаляет
        планировщик
      parameters:
      - description: Уникальный идентификатор запроса
        in: header
        name: X-Request-Id
        required: true
        type: string
      - description: Список UUID и флаг force
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.DeleteManyRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - VkAuth: []
      summary: Удалить несколько файлов
      tags:
      - attachments
    get:
      consumes:
      - application/json
      description: Возвращает список подписанных временных ссылок для переданных UUID
      parameters:
      - description: Уникальный идентификатор запроса
        in: header
        name: X-Request-Id
        required: true
        type: string
      - description: Список UUID и TTL
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.GetManyRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.GetManyResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - VkAuth: []
      summary: Получить временные ссылки на несколько файлов
      tags:
      - attachments
    post:
      consumes:
      - application/json
      description: Передаёт файл в сервис вложений через gRPC и возвращает UUID созданной
        записи
      parameters:
      - description: Уникальный идентификатор запроса
        in: header
        name: X-Request-Id
        required: true
        type: string
      - description: Данные файла
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.PutOneRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.PutOneResponse'
        "400":
          description: Некорректные входные данные
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - VkAuth: []
      summary: Загрузить один файл
      tags:
      - attachments
  /v1/attachments/{id}:
    delete:
      description: Удаляет файл по UUID. При force=false счётчик уменьшается; физически
        удаляет планировщик
      parameters:
      - description: Уникальный идентификатор запроса
        in: header
        name: X-Request-Id
        required: true
        type: string
      - description: UUID файла
        in: path
        name: id
        required: true
        type: string
      - description: Принудительное немедленное удаление (по умолчанию false)
        in: query
        name: force
        type: boolean
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - VkAuth: []
      summary: Удалить файл
      tags:
      - attachments
    get:
      description: Возвращает подписанную временную ссылку для скачивания файла по
        его UUID
      parameters:
      - description: Уникальный идентификатор запроса
        in: header
        name: X-Request-Id
        required: true
        type: string
      - description: UUID файла
        in: path
        name: id
        required: true
        type: string
      - description: Время жизни ссылки в секундах (по умолчанию 3600)
        in: query
        name: ttl
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.GetOneResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - VkAuth: []
      summary: Получить временную ссылку на файл
      tags:
      - attachments
  /v1/attachments/batch:
    post:
      consumes:
      - application/json
      description: Передаёт список файлов в сервис вложений через gRPC и возвращает
        список UUID
      parameters:
      - description: Уникальный идентификатор запроса
        in: header
        name: X-Request-Id
        required: true
        type: string
      - description: Список файлов
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.PutManyRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.PutManyResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
