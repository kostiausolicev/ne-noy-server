          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - VkAuth: []
      summary: Получение всех постов в очереди событий
      tags:
      - EventQueue
    post:
      consumes:
      - application/json
      parameters:
      - description: X-Request-Id
        in: header
        name: X-Request-Id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
